<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liver Function Tests (LFT) Guide | Lab Guide</title>
    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d82;
            --text-main: #1a202c;
            --text-muted: #4a5568;
            --bg-light: #f8fafc;
            --danger: #e53e3e;
            --success: #38a169;
            --warning: #dd6b20;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
        }
        header {
            background-color: white;
            padding: 15px 0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .container {
            width: 90%;
            max-width: 960px;
            margin: auto;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .main-content {
            padding: 40px 0;
        }
        .test-header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            border-left: 5px solid #ecc94b;
            margin-bottom: 30px;
        }
        .test-header h1 {
            margin: 0 0 10px 0;
            color: var(--primary);
            font-size: 28px;
        }
        .info-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            margin-bottom: 25px;
        }
        .info-section h2 {
            color: var(--primary-dark);
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 15px;
        }
        th, td {
            padding: 14px 15px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: #f8fafc;
            color: var(--primary);
            font-weight: 600;
        }
        .status-normal {
            color: var(--success);
            font-weight: bold;
            background: #f0fff4;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .status-high {
            color: var(--danger);
            font-weight: bold;
            background: #fff5f5;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .parameter-block {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e2e8f0;
        }
        .parameter-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .parameter-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        .parameter-title span {
            font-size: 11px;
            background: #ebf8ff;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }
        .insight-heading {
            font-size: 13px;
            font-weight: bold;
            color: #4a5568;
            margin: 5px 0 2px 0;
        }
        .btn-back {
            display: inline-block;
            background-color: #e2e8f0;
            color: var(--text-main);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn-back:hover {
            background-color: #cbd5e0;
        }
        footer {
            background-color: #1a202c;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 10px;
        }
    </style>
</head>

    <header>
